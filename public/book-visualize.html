<!DOCTYPE html>
<html>
<head>
  <title>图书信息可视化</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/theme-listener.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="iframe-content">
  <div class="profile-section">
    <h2>图书信息可视化</h2>
    <div class="form-group">
      <div class="form-row">
        <label for="analysisType">分析维度:</label>
        <select id="analysisType">
          <option value="publisher">出版社</option>
          <option value="author">作者</option>
          <option value="rating">评分</option>
        </select>
      </div>
      <div class="form-row">
        <label for="chartType">图表类型:</label>
        <select id="chartType">
          <option value="bar">柱状图</option>
          <option value="pie">饼图</option>
          <option value="line">折线图</option>
        </select>
      </div>
      <button id="visualizeBtn" class="primary-btn">生成图表</button>
      <div id="chartContainer" class="chart-container"></div>
    </div>
  </div>
  <script src="js/book-visualize.js"></script>
</body>
</html>
